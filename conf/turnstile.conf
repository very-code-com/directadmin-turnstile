# Cloudflare Turnstile Configuration
# Get your keys at: https://dash.cloudflare.com → Turnstile
#
# Test keys (always pass, show red banner):
#   SITE_KEY=1x00000000000000000000AA
#   SECRET_KEY=1x0000000000000000000000000000000AA

SITE_KEY=1x00000000000000000000AA
SECRET_KEY=1x0000000000000000000000000000000AA
ENABLED=yes
# Token validity in seconds (how long after Turnstile verification the login is allowed)
TOKEN_TTL=300
# Fail-open: if yes, allow login when Cloudflare is unreachable
FAIL_OPEN=yes
